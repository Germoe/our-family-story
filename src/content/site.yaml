about:
  title: "Meet Us"
  intro: "We believe that family is built on unconditional love, and we're excited to grow ours through adoption."
  people:
    - name: "Brett"
      title: "Operations Management Professional & Lifelong Planner"
      bio: "Brett works in operations management, where he enjoys improving processes and bringing a sense of calm and order to everyday life. A natural organizer with an A-type streak, he also loves board games, road trips, live concerts and musicals, and traveling to visit friends and family abroad.\n\n Growing up in a small town in western New York and later falling in love with city life helped shape who Brett is today—someone who enjoys the energy of the city but is just as happy getting out in nature to hike, bike, or kayak. He’s always known he wanted to be a parent and feels deeply grateful to be at a place in life where he’s ready for that responsibility. Even more, he’s ready to parent alongside a steady and loving partner who balances him in all the best ways."
      quote: "I’ve always thought of family as something beyond blood, and home as more than the building we live in — it’s the love, the support, the adventures and the life we build together."
      image: "brett.jpg"
    - name: "Sebastian"
      title: "Data Scientist & Curious Explorer"
      bio: "I love figuring things out—whether that’s a deep technical project or a brand-new adventure. Curiosity shapes how I work, learn, and move through the world. \n\n Outside of work, I’m happiest hiking, bouldering, or spending time near the water (swimming, diving, snorkeling, or - soon - sailing). I deeply value time with family and friends and the small, everyday moments we share. I look forward to sharing all sorts of family and friends around BBQs in the backyard or Bills Games. The Arts and Music are a big part of my life too, and I can already picture dancing around the living room with a little kiddo to Brandi Carlile, Taylor Swift, or Chappell Roan—and maybe even taking them to their first concert someday."
      quote: "I hope to create a life filled with curiosity, adventure, music, and lots of love for a child. I am most excited to find out who our child wants to be and help them figure that out along the way."
      image: "sebastian.jpg"
quick_answers:
  title: "Short Questions"
  subtitle: "Us at a glance ..."
  items:
    - question: "How would a close friend describe you in three words?"
      answers:
        - person: "Brett"
          response: "Kind, thoughtful, and a little bit competitive (think board games)."
        - person: "Sebastian"
          response: "Honest, curious, and a little bit goofy (in the best way)."
    - question: "What helps you recharge at home after a long day?"
      answers:
        - person: "Brett"
          response: "Listening to a favorite audiobook (lately all books by Brandon Sanderson)"
        - person: "Sebastian"
          response: "Cooking a new recipe always helps me unwind and feel accomplished after a long day."
    - question: "What's a small thing that makes you day better?"
      answers:
        - person: "Brett"
          response: "Waking up to coffee and breakfast each morning!"
        - person: "Sebastian"
          response: "Boom Chicka Pop Kettle Corn. It is just phenomenal!"
    - question: "What's a favorite way to spend an hour alone?"
      answers:
        - person: "Brett"
          response: "Working out at the gym"
        - person: "Sebastian"
          response: "Tinkering on my laptop on a side project"
    - question: "What's a comfort routine you return to?"
      answers:
        - person: "Brett"
          response: "Falling asleep to Big Bang Theory"
        - person: "Sebastian"
          response: "Watching a Sci-Fi or Fantasy movie or TV show (e.g. Dune, Star Wars (Episode I-VI))"
    - question: "What value guides most of your decisions?"
      answers:
        - person: "Brett"
          response: "Kindness. I often try to think how my actions will not only impact myself but also the people most important to me"
        - person: "Sebastian"
          response: "Curiosity. I like to try things I haven't had before on food menus and in life. Fairness - something in me cannot bare it when people are treated unfairly"
    - question: "What are you curious about right now?"
      answers:
        - person: "Brett"
          response: "Electric Vehicles (EVs) dominate my YouTube feed. I love to follow along as new vehicles are released, the charging network expands and watch the global transition to EVs"
        - person: "Sebastian"
          response: "I'm obsessed with figuring out how to create a fully buildable lego plan from only an image."
    - question: "What's a belief that's changed for you over time?"
      answers:
        - person: "Brett"
          response: "I used to think it was more important to be nice and polite. Being with Sebastian and living in Germany really shifted that. I now value honesty most."
        - person: "Sebastian"
          response: "Trying to enjoy the journey to get somewhere is equally important as getting there. I used to be stressed out about achieving goals and now I try to find joy in the process of working towards them."
    - question: "What's something new you'd like to try someday?"
      answers:
        - person: "Brett"
          response: "Sky diving. Even if just once."
        - person: "Sebastian"
          response: "Cross-Country Skiing, Jetskiing, taking a ride in a hot air balloon, learning to swim butterfly style, diving from a 5- and 10-meter platform"
    - question: "What's a favorite movie, book or show you return to?"
      answers:
        - person: "Brett"
          response: "The Inheritance Cycle (Eragon book series)"
        - person: "Sebastian"
          response: "Arrival (movie)"
    - question: "What does a perfect weekend at home look like for us?"
      answers:
        - person: "Brett & Sebastian"
          response: "Breakfast in bed, listening to some music and BBQ in the backyard with family and friends"
    - question: "What does 'family' mean to us"
      answers:
        - person: "Brett & Sebastian"
          response: "Nobody loves you like family. They are the people that cherish you at your best and hug you closer at your worst. Family is forever - whether they are born into your life or come to it through love and choice."
    - question: "What's something that always makes us laugh?"
      answers:
        - person: "Brett & Sebastian"
          response: "Singing along to our favorite songs together in the car (usually wildly off-key)"
    - question: "What kind of traditions would you like to build?"
      answers:
        - person: "Brett & Sebastian"
          response: "We're excited to merge American and German traditions. For example, one of Sebastian's favorite Holidays was St. Nikolaus Day, where kids leave their shoes out on the night of December 5th and wake up to find them filled with treats"
    - question: "What does love look like in our everyday life?"
      answers:
        - person: "Brett & Sebastian"
          response: "Making a second coffee for the other person in the morning, buying Boom Chicka Pop Kettle Corn and hide it so it's ready for movie nights, planning weekends away for just the two of us, scraping the other person's car when you're out in the snow first. Giving a hug when the other person feels down. Talking about the things that bother us openly"


our_village:
  title: "Our Village"
  subtitle: "The people who cheer us on"
  intro: "We are surrounded by a loving circle of family and friends who are ready to welcome a child with open arms and warm hearts."
  entries:
    - title: "Brett's Parents"
      subtitle: "American roots"
      body: "Brett's Parents, Joycette and Tom, live close by in Brett's hometown. We visit them every week for dinners, lunches, hikes and game nights. They are so excited about our decision to grow our family through adoption. We can't wait for our little one to eat their weight in Joycette's cookies and play games with Grandpa Tom in their big backyard."
      image: "mom_dad.jpg"
    - title: "Sebastian's Parents"
      subtitle: "German roots"
      body: "Sebastian's Parents, Bärbel and Manfred, live in the bustling city of Berlin, Germany. They have always been incredibly supportive of our relationship and are thrilled about our decision to grow our family through adoption. They spend every other Christmas with us in Buffalo and are in town at least once a year for a couple of months. They can't wait for arts and crafts with Oma Bärbel and to get up to silly adventures with Opa Manfred."
      image: "mama_papa.jpg"
    - title: "Sarah & Jason"
      subtitle: "More family from Buffalo"
      body: "Jason is Brett’s cousin, but has always felt more like a brother ever since moving in with Brett's family as teenagers, and Sarah has been Brett’s best friend since middle school, growing up just down the street. Their two kids are our beloved niece and nephew. We're truly glad to be back in their part of the world and look forward to many more family gatherings, and Sarah's famous Buffalo Chicken Wing Dip!"
      image: "sarah_jason.jpg"
    - title: "Seth & Adam"
      subtitle: "Fellow Foodies and Friends"
      body: "Seth has been a close friend of Brett’s since university, when he ran the LGBTA alongside Brett and Tracey—and he’s also arguably the reason we found each other, as it was through the art collective Seth ran that we first got to know one another. These days, our friendship often looks like Wednesday night food hunts around Buffalo and the annual group “glamping” trip, both traditions we look forward to every year."
      image: "seth_adam.jpg"
    - title: "Cris & Jerry"
      subtitle: "Sebastian's American 'Family'"
      body: "As the parents of Sebastian's university friend Maxi, they welcomed him into their home for every major holiday when he had no family nearby. Now that we live in the area again, we’ve joyfully resumed holiday traditions together. Living just down the street, they continue to show that same generosity—already offering to babysit having two more people besides Sebastian to connect with our future child in both German and English (as they lived in Germany themselves)."
      image: "cris_jerry.jpg"
    - title: "Marc & Tracey"
      subtitle: "Uncle and Aunt from NYC"
      body: "Brett met Tracey at university, where they ran their school’s LGBTA, that friendship grew over time—through three shared apartments, countless trips, and many unforgettable memories. Marc and Sebastian have always clicked just as easily, making time together feel effortless from the start. Even when life has taken us to different cities or even different countries, we’ve always made space for each other. "
      image: "marc_tracey.jpg"
    - title: "Brian & Jule"
      subtitle: "Friend's for everything"
      body: "Brian and Jule are some of our closest friends and were the first to visit us after we moved from Berlin to the U.S. They also already announced that they are ready to be back on a plane as soon as we have a little one to meet! We can't imagine a life without these two crazy ones in it. They bring so much joy and laughter wherever they go!"
      image: "brian_jule.jpg"
    - title: "Tina, Alex & Johan"
      subtitle: "Practically Family"
      body: "Sebastian met Tina when they were both volunteering for Berlin Pride. Tina and her wife Alex wanted to start a family and asked Sebastian to help them. Their son Johan is now 6 years old and Sebastian's biological child. We visit them every year in Berlin and they plan on coming to visit us in Buffalo. They are very active in their local community and are an example for us of how to be wonderful parents to their little kiddo."
      image: "tina_alex.jpg"
    - title: "Lilith & Gabriel"
      subtitle: "Active cousins from Germany"
      body: "Lilith and Sebastian have been close friends since their school days. Gabriel and Brett hit it off immediately, bonding over Gabriel's beloved German fare and hiking the mountains every time we visit. Them and their two little kids are excited to be part of our journey and look forward to being a loving aunt, uncle and cousins!"
      image: "lilith_gabriel.jpg"
    - title: "Dani & Mario"
      subtitle: "Friends from School"
      body: "Dani is a friend from Sebastian's high school days. They've been close ever since and she has always been a big supporter of our relationship. Dani and her partner Mario live in Berlin with their two kids and are excited to be part of our journey to parenthood."
      image: "dani_mario.jpg"
    - title: "Sophia & Giovanni"
      subtitle: "Friends from School"
      body: "Sebastian and Sophia went to elementary school together and reconnected at the end of high school. Sophia always loved Italy and moved there for university. Her and her partner Giovanni recently moved back to Italy after living in Berlin for a few years. They are our oasis of calm and kindness and can't wait to be part of our journey to parenthood. Even if they live far away, they are family to us."
      image: "sophia_giovanni.jpg"
home_life:
  title: "Our Home & Neighborhood"
  subtitle: "A safe, joyful space to grow"
  description: "We live in a cozy multi-unit home in one of Buffalo’s most vibrant neighborhoods. We love our neighborhood cafés, parks, and friendly neighbors."
  spotlights:
    - title: "Welcome home"
      subtitle: "Our cozy Buffalo abode"
      category: "home"
      image: "our-house.jpg"
      caption: "A safe, joyful space to grow."
      description: "We bought our first home in February 2025—a multi-unit home in the heart of one of Buffalo’s most vibrant neighborhoods. We love being able to walk to nearby cafés, restaurants, shops, and museums, and feeling connected to a community that’s always lively and welcoming."
    - title: "Backyard play space"
      category: "home"
      image: "backyard.jpg"
      caption: "Room to roam, garden, and play—steps from the kitchen and ready for sandbox days."
      description: "One of our most exciting projects for 2026 is transforming our backyard with new plants, patio area, fire pit and lighting to create a space where we can truly enjoy Buffalo’s beautiful warm months."
    - title: "Living Room"
      category: "home"
      image: "brett-living-room.jpg"
      caption: "Room to roam, garden, and play—steps from the kitchen and ready for sandbox days."
      description: "Our living room is cozy and inviting, the kind of space where we curl up on rainy days with a book, watch a movie together, or cheer on the Bills."
    - title: "Kitchen"
      category: "home"
      image: "sebastian-kitchen.jpg"
      caption: "Room to roam, garden, and play—steps from the kitchen and ready for sandbox days."
      description: "Our kitchen is the heart of our home—the space where Sebastian experiments with new recipes, preps meals for the week, and fills the air with delicious smells. It’s a place for cooking, conversation, and sharing good food together."
    - title: "Tree-lined streets"
      category: "home"
      image: "neighborhood.png"
      caption: "Room to roam, garden, and play—steps from the kitchen and ready for sandbox days."
      description: "Parks, playgrounds, and friendly neighbors. We like the bustle of our little neighborhood. We stroll the farmer's market on Saturdays, stop for coffee at our favorite café, ride our bikes down Bidwell Park Ave and watch the pride parade go by every year."
